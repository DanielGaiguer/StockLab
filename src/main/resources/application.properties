spring.application.name=stocklab
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/stocklab}
spring.datasource.username=${DB_USER:stocklab}
spring.datasource.password=${DB_PASSWORD:stocklab123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=${PORT:8080}

app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
